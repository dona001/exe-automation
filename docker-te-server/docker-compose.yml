services:
  # Mock TN3270 mainframe (for local testing without a real IBM mainframe)
  mock-mainframe:
    build: ./mock-tn3270
    ports:
      - "3270:3270"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost',3270)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 5

  # TE Server API
  te-server:
    build: .
    ports:
      - "9995:9995"
    volumes:
      - ./sessions:/app/sessions
    environment:
      - TE_PORT=9995
      - AUTO_CONNECT_DIR=/app/sessions
    depends_on:
      mock-mainframe:
        condition: service_healthy
    restart: unless-stopped
